app = 'unique-ceramics'
primary_region = 'waw'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'ceramics_storage'
  destination = '/mnt/data'
  initial_size = '3gb'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
